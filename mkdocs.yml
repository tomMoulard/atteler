site_name: Atteler
site_description: A Go-only LLM harness — TUI/CLI over multiple providers.
site_url: https://tommoulard.github.io/atteler/
repo_url: https://github.com/tomMoulard/atteler
repo_name: tomMoulard/atteler
docs_dir: docs

# Generated fragments are included into pages via pymdownx.snippets; they must
# not also be built as standalone pages.
exclude_docs: |
  generated/
  mkdocs_hooks.py
  requirements.txt

theme:
  name: material
  language: en
  icon:
    logo: material/horse-variant
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Palette toggle: follow system, then explicit light/dark.
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips

extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike
    default: main
    alias: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tomMoulard/atteler
      name: Atteler on GitHub

hooks:
  - docs/mkdocs_hooks.py

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Common workflows: common-workflows.md
  - Configuration: configuration.md
  - Providers: providers.md
  - Hooks: hooks.md
  - CLI reference: cli-reference.md
  - Architecture: architecture.md
  - Reference:
      - Lifecycle events: lifecycle-events.md
      - Symphony: symphony.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true

plugins:
  - search
