name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate
        run: make generate

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Black-box CLI E2E
        run: |
          mkdir -p artifacts
          make e2e 2>&1 | tee artifacts/e2e.log

      - name: Build GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish --parallelism=1

      - name: Smoke GoReleaser snapshot artifact
        run: |
          mkdir -p artifacts
          .github/scripts/smoke-goreleaser-snapshot.sh dist 2>&1 | tee artifacts/release-smoke.log

      - name: Upload release-gate failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-logs
          path: |
            artifacts/*.log
            dist/**
          if-no-files-found: ignore

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
