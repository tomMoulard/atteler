name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    # pages: write lets configure-pages enable GitHub Pages via the API, so no
    # manual Settings → Pages toggle is required to bootstrap the site.
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install MkDocs Material
        run: pip install -r docs/requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Publish LLM docs at site root
        run: cp llms.txt llms-full.txt site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
