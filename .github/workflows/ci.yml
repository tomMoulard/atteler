name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Generate, lint, test, build, and package snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Generate
        run: make generate

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Lint
        run: make lint

      - name: Context convention scan
        run: go test ./pkg/watch -run TestRepositoryContextRootsStayAtEntrypoints -count=1

      - name: Issue template vocabulary check
        run: go test ./test/repository -count=1

      - name: Test
        run: make test

      - name: Black-box CLI E2E
        run: |
          set -o pipefail
          mkdir -p artifacts
          make e2e 2>&1 | tee artifacts/e2e.log

      - name: Upload E2E failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-e2e-logs
          path: artifacts/*.log
          if-no-files-found: ignore

      - name: Build
        run: make build

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Build GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish --parallelism=1

      - name: Smoke GoReleaser snapshot artifact
        run: |
          set -o pipefail
          mkdir -p artifacts
          .github/scripts/smoke-goreleaser-snapshot.sh dist 2>&1 | tee artifacts/release-smoke.log

      - name: Upload release-gate failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-release-gate-logs
          path: |
            artifacts/*.log
            dist/**
          if-no-files-found: ignore
