name: CI

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - "**"

permissions:
  contents: read

# Full CI is intentionally PR-safe: the job uses read-only repository
# permissions, never references repository secrets, and avoids
# pull_request_target privileges for forked contributions.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Keep this check name stable for branch-protection rules.
    name: Generate, lint, test, build, and package snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Generate
        run: make generate

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Lint
        run: make lint

      - name: Context convention scan
        run: go test ./pkg/watch -run TestRepositoryContextRootsStayAtEntrypoints -count=1

      - name: Issue template vocabulary check
        run: go test ./test/repository -count=1

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Build GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
