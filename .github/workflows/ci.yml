name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Generate, lint, test, build, and package snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-recurse-submodules origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*'
          git checkout --force "${GITHUB_SHA}"

      - name: Set up Go
        shell: bash
        run: |
          set -euo pipefail
          go_version="$(awk '/^go / { print $2; exit }' go.mod)"
          curl -fsSL "https://go.dev/dl/go${go_version}.linux-amd64.tar.gz" -o "${RUNNER_TEMP}/go.tgz"
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf "${RUNNER_TEMP}/go.tgz"
          echo "/usr/local/go/bin" >> "${GITHUB_PATH}"
          echo "$(/usr/local/go/bin/go env GOPATH)/bin" >> "${GITHUB_PATH}"
          /usr/local/go/bin/go version

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@latest

      - name: Tidy
        run: go mod tidy

      - name: Generate
        run: make generate

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Lint
        run: make lint

      - name: Context convention scan
        run: go test ./pkg/watch -run TestRepositoryContextRootsStayAtEntrypoints -count=1

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Check GoReleaser config
        run: goreleaser check

      - name: Build GoReleaser snapshot
        run: goreleaser release --snapshot --clean --skip=publish
