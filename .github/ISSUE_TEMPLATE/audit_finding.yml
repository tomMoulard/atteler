name: Audit finding
description: Capture review, quality, architecture, or workflow-audit findings with evidence and risk metadata.
title: "[Audit]: "
labels: ["quality", "roadmap"]
projects: ["tomMoulard/3"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for findings from code review, documentation review, workflow audit, quality gate review, or project hygiene checks.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the finding.
      placeholder: "The repository claims ... but ..."
    validations:
      required: true
  - type: input
    id: audit_source
    attributes:
      label: Audit source
      description: Where did this finding come from?
      placeholder: "manual review, CI, issue #123, code review, Symphony run, docs audit"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Provide file references, line numbers, command output, project links, or issue references.
      placeholder: |
        - README.md:...
        - .github/... missing
        - Command output: ...
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What does the repository, workflow, or documentation do today?
      placeholder: "The current state is ..."
    validations:
      required: true
  - type: textarea
    id: desired_behavior
    attributes:
      label: Desired behavior
      description: What should change to resolve the finding?
      placeholder: "The repository should ..."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / boundaries
      description: What is in scope for this finding, and what should not be changed?
      placeholder: |
        In scope:
        - ...
        Out of scope:
        - ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Match the atteler roadmap Area project field.
      options:
        - Roadmap
        - CLI/UX
        - Scanner
        - RAG
        - Review Gates
        - Workflow Audit
        - Providers
        - Permissions
        - Worktree
        - SDK
      default: 5
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Affected provider
      description: Name the provider/model/backend if relevant; enter `none` when not provider-specific.
      placeholder: "openai, anthropic, codex, ollama, none"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      description: Proposed atteler roadmap Status value. New issues normally start as Todo.
      options:
        - Todo
        - In Progress
        - Done
      default: 0
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Match the atteler roadmap Priority project field.
      options:
        - P0 - Now
        - P1 - Next
        - P2 - Later
      default: 1
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      description: Match the atteler roadmap Risk project field.
      options:
        - Trust/Safety
        - Product Coherence
        - Architecture Debt
        - Quality Signal
      default: 3
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification command
      description: Which command or review proves the finding is fixed? Say `not run` only with a reason.
      placeholder: "go test ./..., make lint, or manual checklist"
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Bullet the observable conditions that must be true before this can close.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: checkboxes
    id: duplicates
    attributes:
      label: Duplicate search
      options:
        - label: I searched existing issues and linked likely duplicates or related issues above.
          required: true
  - type: dropdown
    id: automation_dispatch
    attributes:
      label: Automation dispatch intent
      description: Audit findings do not dispatch Symphony by default. Maintainers add the `symphony` label only after explicit opt-in and safety review.
      options:
        - No — roadmap/triage only; do not dispatch Symphony
        - Maybe — maintainer should decide before adding the symphony label
      default: 0
    validations:
      required: true
