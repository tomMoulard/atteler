name: Public-safe security-sensitive concern
description: Discuss public-safe trust, permissions, or safety concerns; use private reporting for exploitable vulnerabilities.
title: "[Security]: "
labels: ["security"]
projects: ["tomMoulard/3"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not disclose exploitable vulnerabilities, secrets, private tokens, or private user data in a public issue.** Use [GitHub Private Vulnerability Reporting](https://github.com/tomMoulard/atteler/security/advisories/new) for those reports. This form is only for public-safe security-sensitive concerns such as permissions design, trust boundaries, disclosure policy gaps, or hardening ideas.
  - type: checkboxes
    id: disclosure_safety
    attributes:
      label: Public disclosure safety
      options:
        - label: I confirm this issue is safe to discuss publicly and contains no exploit instructions, secrets, credentials, or private user data.
          required: true
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the public-safe concern.
      placeholder: "The permission boundary for ... is unclear because ..."
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Provide public-safe code references, docs, threat model notes, command output, or issue links.
      placeholder: |
        Public-safe evidence only. Do not paste secrets or exploit steps.
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What trust, safety, or permission behavior exists today?
      placeholder: "Currently ..."
    validations:
      required: true
  - type: textarea
    id: desired_behavior
    attributes:
      label: Desired behavior
      description: What safer behavior, documentation, or guardrail should exist?
      placeholder: "The repository should ..."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / boundaries
      description: What public-safe concern is in scope, and what should not be discussed or changed here?
      placeholder: |
        In scope:
        - ...
        Out of scope:
        - Secrets, private data, exploit instructions, or unrelated hardening work.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Match the atteler roadmap Area project field.
      options:
        - Roadmap
        - CLI/UX
        - Scanner
        - RAG
        - Review Gates
        - Workflow Audit
        - Providers
        - Permissions
        - Worktree
        - SDK
      default: 7
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Affected provider
      description: Name the provider/model/backend if relevant; enter `none` when not provider-specific.
      placeholder: "openai, anthropic, codex, ollama, none"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      description: Proposed atteler roadmap Status value. New issues normally start as Todo.
      options:
        - Todo
        - In Progress
        - Done
      default: 0
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Match the atteler roadmap Priority project field.
      options:
        - P0 - Now
        - P1 - Next
        - P2 - Later
      default: 1
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      description: Match the atteler roadmap Risk project field.
      options:
        - Trust/Safety
        - Product Coherence
        - Architecture Debt
        - Quality Signal
      default: 0
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification command
      description: Which command, review, or policy check proves the concern is addressed? Say `not run` only with a reason.
      placeholder: "make test, make lint, manual threat-model review, or docs review"
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Bullet the observable conditions that must be true before this can close.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: checkboxes
    id: duplicates
    attributes:
      label: Duplicate search
      options:
        - label: I searched existing issues and linked likely duplicates or related issues above.
          required: true
  - type: dropdown
    id: automation_dispatch
    attributes:
      label: Automation dispatch intent
      description: Security-sensitive issues do not dispatch Symphony by default. Maintainers add the `symphony` label only after explicit opt-in and disclosure-safety review.
      options:
        - No — public security triage only; do not dispatch Symphony
        - Maybe — maintainer should decide after confirming disclosure safety
      default: 0
    validations:
      required: true
